syntax = "proto3";

package demo;

message Empty {}

// 定义请求消息
message HelloRequest {
  string name = 1;
}

// 定义响应消息
message HelloReply {
  string message = 1;
}

// 定义服务
service Greeter {
  // 发送一个招呼
  rpc SayHello (HelloRequest) returns (HelloReply) {}
}

// 回测服务
message BacktestRequest {
  string symbol = 1;
}

message BacktestResultReply {
  string start_date = 1;
  string end_date = 2;
  uint32 total_days = 3;

  uint32 profit_days = 4;
  uint32 loss_days = 5;
  float total_net_pnl = 6;
  float daily_net_pnl = 7;

  float total_commission = 8;
  float daily_commission = 9;
  float total_slippage = 10;
  float daily_slippage = 11;
  float total_turnover = 12;
  float daily_turnover = 13;

  uint64 total_trade_count = 14;
  float daily_trade_count = 15;

  float end_balance = 16;
  float total_return = 17;
  float annual_return = 18;
  float daily_return = 19;
  float return_std = 20;

  float max_drawdown = 21;
  float max_ddpercent = 22;
  uint64 max_drawdown_duration = 23;
  float sharpe_ratio = 24;
  float ewm_sharpe = 25;
  float return_drawdown_ratio = 26;
  float rgr_ratio = 27;

  uint32 error_code = 28;
}

message BacktestListReply {
    repeated BacktestResultReply results = 1;
    uint32 total_count = 2;
}

service Backtester {
  rpc StartBacktest (BacktestRequest) returns (BacktestResultReply) {}
  rpc GetAllBacktestResults (BacktestRequest) returns (BacktestListReply) {}
  rpc GetTargetBacktestResult (BacktestRequest) returns (BacktestResultReply) {}
  rpc StartTest (BacktestRequest) returns (BacktestResultReply) {}
}


message GatewayRequest {
  string gateway_name = 1;
}

message GatewayReply {
  string message = 1;
}

message SendOrderRequest {
  string gateway_name = 1;
}

message SendOrderReply {
  string order_id = 1;
}

// gateway管理
service GatewayManager {
  rpc AddGateway (GatewayRequest) returns (GatewayReply) {}

  rpc SendOrder (SendOrderRequest) returns (SendOrderReply) {}
}

message EventReply {
  string name = 1;
  string data = 2;
}

// 事件引擎
service EventEngine {
    rpc SubscribeEvents (Empty) returns (stream EventReply);
}


// 数据管理服务
message SyncDataRequest {
  string interface = 1;
  string symbol = 2;
  string start_time = 3;
  string end_time = 4;
  string granularity = 5;
  string storage = 6;
}

message SyncDataReply {
  string data_id = 1;
}

message GetOverviewRequest {
  string data_id = 1;
}

message GetOverviewReply {
  string exchange = 1;
  string symbol = 2;
  uint32 total = 3;
  string start_dt_str = 4;
  string end_dt_str = 5;
  string type = 6;
}

message GetOverviewListReply {
  repeated GetOverviewReply results = 1;
  uint32 total_count = 2;
}

message AddRecordSymbolRequest {
  string symbol = 1;
}

message GetRecordStreamReply {
  string detail = 1;
}

message GetRecordStreamListReply {
  repeated GetRecordStreamReply streams = 1;
  uint32 count = 2;
}

service DataManager {
  rpc StartRecord(Empty) returns (Empty) {}
  rpc StopRecord(Empty) returns (Empty) {}
  rpc AddRecordSymbol(AddRecordSymbolRequest) returns (Empty) {}
  rpc GetRecordStreams(Empty) returns (GetRecordStreamListReply) {}
  rpc SyncData (SyncDataRequest) returns (SyncDataReply) {}
  rpc GetOverview (GetOverviewRequest) returns (GetOverviewListReply) {}
}

// Configure Manager
message ConfigFieldMsg {
  string key = 1;
  string value = 2;
}

message SaveConfigListRequest {
  string category = 1;
  string name = 2;
  repeated ConfigFieldMsg fields = 3;
  uint32 field_count = 4;
}

message SaveConfigReply {
  string request_id = 1;
}

message LoadConfigRequest {
  string category = 1;
  string name = 2;
}

message LoadConfigReply {
  repeated ConfigFieldMsg fields = 1;
  uint32 field_count = 2;
}

service ConfigureManager {
  rpc SaveConfig (SaveConfigListRequest) returns (SaveConfigReply) {}
  rpc LoadConfig (LoadConfigRequest) returns (LoadConfigReply) {}
}

// Ipython
message ExecuteRequest {
  string code = 1;
}

message ExecuteReply {
  string text_output = 1;      // 普通文本
  bytes data_content = 2;      // 二进制数据（图片等）
  string msg_type = 3;         // "stdout", "error", "display_data"
  string mime_type = 4;        // "text/plain", "image/png"
}

service IpythonKernelManager {
  rpc ExecuteCode (ExecuteRequest) returns (stream ExecuteReply);
}

// LLM
message LLMRequest {
  string msg = 1;
}

message LLMReply {
  string msg = 1;
}

service LLMManager {
  rpc AskStream (LLMRequest) returns (stream LLMRequest);
  rpc ExtractCode (LLMRequest) returns (LLMReply);
}